name: Verify blocks

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24

      - name: Check JavaScript syntax
        run: find blocks lib action examples scripts tests -name '*.mjs' -print0 | xargs -0 -n1 node --check

      - name: Run behavior contracts
        run: node --test tests/*.test.mjs

      - name: Rebuild deterministic examples
        run: node examples/render-all.mjs

      - name: Verify repository evidence
        run: node scripts/verify-repository.mjs

      - name: Reject stale generated output
        run: git diff --exit-code -- examples/out
